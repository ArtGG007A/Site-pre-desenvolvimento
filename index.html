<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Site Pessoal</title>
    <style>
        /* Estilização (CSS) */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background-color: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #6c63ff;
        }

        h1 {
            color: #333;
            margin: 1rem 0 0.5rem;
        }

        p {
            color: #666;
            line-height: 1.6;
        }

        .links {
            margin-top: 1.5rem;
        }

        .btn {
            display: block;
            background-color: #6c63ff;
            color: white;
            padding: 0.8rem;
            margin: 0.5rem 0;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
        }

        .btn:hover {
            background-color: #5750d8;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://via.placeholder.com/150" alt="Sua Foto">
        
        <h1>Olá, eu sou o Usuário</h1>
        <p>Bem-vindo ao meu espaço digital. Sou entusiasta de tecnologia e adoro criar soluções criativas.</p>

        <div class="links">
            <a href="#" class="btn">Meu Portfólio</a>
            <a href="#" class="btn">LinkedIn</a>
            <a href="#" class="btn">Contato via E-mail</a>
        </div>
    </div>

</body>
</html>
